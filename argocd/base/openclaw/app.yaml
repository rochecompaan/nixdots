apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openclaw
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: '4'
spec:
  ignoreDifferences:
    - group: ""
      kind: ConfigMap
      name: openclaw
      jsonPointers:
        - /data
  project: default
  source:
    chart: openclaw
    repoURL: https://serhanekicii.github.io/openclaw-helm/
    targetRevision: 1.3.26
    helm:
      releaseName: openclaw
      valuesObject:
        app-template:
          openclawVersion: "2026.3.2"
          configMode: merge
          controllers:
            main:
              containers:
                main:
                  envFrom:
                    - secretRef:
                        name: openclaw-env-secret
          configMaps:
            config:
              data:
                openclaw.json: |
                  {
                    // Environment variables used by model provider integrations
                    "env": {
                      "OPENROUTER_API_KEY": "${OPENROUTER_API_KEY}",
                      "OPENCLAW_GATEWAY_TOKEN": "${OPENCLAW_GATEWAY_TOKEN}"
                    },

                    // Gateway configuration
                    "gateway": {
                      "port": 18789,
                      "mode": "local",
                      "controlUi": {
                        "dangerouslyAllowHostHeaderOriginFallback": true
                      },
                      // IMPORTANT: trustedProxies uses exact IP matching only
                      // - CIDR notation is NOT supported - list each proxy IP individually
                      // - IPv6 exact addresses may work but are untested
                      // - Recommend single-stack IPv4 deployments for simplicity
                      "trustedProxies": [
                        "10.0.0.1"
                      ]
                    },

                    // Browser configuration (Chromium sidecar)
                    "browser": {
                      "enabled": true,
                      "defaultProfile": "default",
                      "profiles": {
                        "default": {
                          "cdpUrl": "http://localhost:9222",
                          "color": "#4285F4"
                        }
                      }
                    },

                    // Agent configuration
                    "agents": {
                      "defaults": {
                        "workspace": "/home/node/.openclaw/workspace",
                        "model": {
                          // Uses OPENROUTER_API_KEY from environment
                          "primary": "openrouter/openai/gpt-5.3-codex"
                        },
                        "userTimezone": "UTC",
                        "timeoutSeconds": 600,
                        "maxConcurrent": 1
                      },
                      "list": [
                        {
                          "id": "main",
                          "default": true,
                          "identity": {
                            "name": "OpenClaw",
                            "emoji": "\ud83e\udd9e"
                          }
                        }
                      ]
                    },

                    // Session management
                    "session": {
                      "scope": "per-sender",
                      "store": "/home/node/.openclaw/sessions",
                      "reset": {
                        "mode": "idle",
                        "idleMinutes": 60
                      }
                    },

                    // Logging
                    "logging": {
                      "level": "info",
                      "consoleLevel": "info",
                      "consoleStyle": "compact",
                      "redactSensitive": "tools"
                    },

                    // Tools configuration
                    "tools": {
                      "profile": "full",
                      "web": {
                        "search": {
                          "enabled": false
                        },
                        "fetch": {
                          "enabled": true
                        }
                      }
                    }

                    // Channel configuration can be added here:
                    // "channels": {
                    //   "telegram": {
                    //     "botToken": "${TELEGRAM_BOT_TOKEN}",
                    //     "enabled": true
                    //   },
                    //   "discord": {
                    //     "token": "${DISCORD_BOT_TOKEN}"
                    //   },
                    //   "slack": {
                    //     "botToken": "${SLACK_BOT_TOKEN}",
                    //     "appToken": "${SLACK_APP_TOKEN}"
                    //   }
                    // }
                  }
          persistence:
            data:
              storageClass: longhorn
            mail:
              enabled: true
              type: persistentVolumeClaim
              existingClaim: openclaw-maildir
              globalMounts:
                - path: /home/node/.openclaw/workspace/mail
                  readOnly: true
          ingress:
            main:
              enabled: true
              className: traefik
              annotations:
                cert-manager.io/cluster-issuer: compaan-ca
              tls:
                - secretName: openclaw-compaan-tls-v2
                  hosts:
                    - openclaw.compaan
              hosts:
                - host: openclaw.compaan
                  paths:
                    - path: /
                      pathType: Prefix
                      service:
                        identifier: main
                        port: http
  destination:
    server: https://kubernetes.default.svc
    namespace: openclaw
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
