apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw-mbsync
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw-mbsync
  template:
    metadata:
      labels:
        app: openclaw-mbsync
    spec:
      containers:
        - name: mbsync
          image: debian:stable-slim
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -lc
            - |
              set -eu
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y --no-install-recommends ca-certificates isync
              rm -rf /var/lib/apt/lists/*

              escape_mbsync() {
                printf '%s' "$1" | sed 's/[\\"]/\\&/g'
              }

              maildir_root="/mail/Maildir/${GMAIL_ADDRESS}"
              gmail_address_escaped="$(escape_mbsync "${GMAIL_ADDRESS}")"
              gmail_app_password_escaped="$(escape_mbsync "${GMAIL_APP_PASSWORD}")"
              maildir_root_escaped="$(escape_mbsync "${maildir_root}")"
              mkdir -p /work "${maildir_root}"

              cat > /work/mbsyncrc <<EOF_INNER
              IMAPAccount gmail
              Host imap.gmail.com
              User "${gmail_address_escaped}"
              Pass "${gmail_app_password_escaped}"
              Port 993
              TLSType IMAPS
              AuthMechs LOGIN
              CertificateFile /etc/ssl/certs/ca-certificates.crt

              IMAPStore gmail-remote
              Account gmail

              MaildirStore gmail-local
              Path "${maildir_root_escaped}/"
              Inbox "${maildir_root_escaped}/INBOX"
              SubFolders Verbatim

              Channel gmail
              Far :gmail-remote:
              Near :gmail-local:
              Patterns ${OPENCLAW_MBSYNC_PATTERNS}
              Create Both
              Expunge Both
              Remove Both
              Sync All
              SyncState *
              EOF_INNER

              while true; do
                mbsync -V -c /work/mbsyncrc gmail || true
                sleep "${MBSYNC_POLL_SECONDS:-300}"
              done
          envFrom:
            - configMapRef:
                name: openclaw-mail-sync-config
            - secretRef:
                name: webmutt-gmail-secret
          volumeMounts:
            - name: maildir
              mountPath: /mail
      volumes:
        - name: maildir
          persistentVolumeClaim:
            claimName: openclaw-maildir
